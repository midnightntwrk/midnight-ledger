query BlockQuery($block_offset: BlockOffset) {
    block(offset: $block_offset) {
        hash
        height
        protocolVersion
        timestamp
        author
        zswapMerkleTreeRoot
        ledgerParameters
        systemParameters {
            dParameter {
                numPermissionedCandidates
                numRegisteredCandidates
            }
            termsAndConditions {
                hash
                url
            }
        }
        parent {
            hash
            height
        }
        transactions {
            hash
            protocolVersion
            block {
                hash
            }
            contractActions {
                address
                zswapState
                transaction {
                    hash
                    block {
                        hash
                        height
                    }
                    __typename
                    ... on RegularTransaction {
                        transactionResult {
                            status
                            segments {
                                id
                                success
                            }
                        }
                        identifiers
                        zswapStartIndex
                        zswapEndIndex
                        fee
                    }
                }
                unshieldedBalances {
                    tokenType
                    amount
                }
                __typename
                ... on ContractCall {
                    entryPoint
                    deploy {
                        address
                    }
                }
            }
            unshieldedCreatedOutputs {
                owner
                tokenType
                value
                outputIndex
                intentHash
                initialNonce
                registeredForDustGeneration
                createdAtTransaction {
                    hash
                    __typename
                    ... on RegularTransaction {
                        transactionResult {
                            status
                            segments {
                                id
                                success
                            }
                        }
                        identifiers
                        zswapStartIndex
                        zswapEndIndex
                        fee
                    }
                }
                spentAtTransaction {
                    hash
                    __typename
                    ... on RegularTransaction {
                        transactionResult {
                            status
                            segments {
                                id
                                success
                            }
                        }
                        identifiers
                        zswapStartIndex
                        zswapEndIndex
                        fee
                    }
                }
            }
            unshieldedSpentOutputs {
                owner
                tokenType
                value
                outputIndex
                intentHash
                initialNonce
                registeredForDustGeneration
                createdAtTransaction {
                    hash
                    __typename
                    ... on RegularTransaction {
                        transactionResult {
                            status
                            segments {
                                id
                                success
                            }
                        }
                        identifiers
                        zswapStartIndex
                        zswapEndIndex
                        fee
                    }
                }
                spentAtTransaction {
                    hash
                    __typename
                    ... on RegularTransaction {
                        transactionResult {
                            status
                            segments {
                                id
                                success
                            }
                        }
                        identifiers
                        zswapStartIndex
                        zswapEndIndex
                        fee
                    }
                }
            }
            zswapLedgerEvents {
                id
            }
            dustLedgerEvents {
                id
                __typename
                ... on DustInitialUtxo {
                    output {
                        nonce
                    }
                }
            }
            __typename
            ... on RegularTransaction {
                transactionResult {
                    status
                    segments {
                        id
                        success
                    }
                }
                identifiers
                zswapStartIndex
                zswapEndIndex
                fee
            }
        }
    }
}

