subscription ShieldedTransactionsSubscription($sessionId: HexEncoded!) {
    shieldedTransactions(sessionId: $sessionId) {
        __typename
        ... on RelevantTransaction {
            transaction {
                zswapStartIndex
                zswapEndIndex
            }
            zswapCollapsedUpdate {
                startIndex
                endIndex
            }
        }
        __typename
        ... on ShieldedTransactionsProgress {
            highestEndIndex
            highestCheckedEndIndex
            highestRelevantEndIndex
        }
    }
}

subscription UnshieldedTransactionsSubscription($address: UnshieldedAddress!) {
    unshieldedTransactions(address: $address) {
        __typename
        ... on UnshieldedTransaction {
            transaction {
                hash
                __typename
                ... on RegularTransaction {
                    transactionResult {
                        status
                        segments {
                            id
                            success
                        }
                    }
                    identifiers
                    zswapStartIndex
                    zswapEndIndex
                    fee
                }
            }
            createdUtxos {
                owner
                tokenType
                value
                outputIndex
                intentHash
                initialNonce
                registeredForDustGeneration
                createdAtTransaction {
                    hash
                    __typename
                    ... on RegularTransaction {
                        transactionResult {
                            status
                            segments {
                                id
                                success
                            }
                        }
                        identifiers
                        zswapStartIndex
                        zswapEndIndex
                        fee
                    }
                }
            }
            spentUtxos {
                owner
                tokenType
                value
                outputIndex
                intentHash
                initialNonce
                registeredForDustGeneration
                createdAtTransaction {
                    hash
                    __typename
                    ... on RegularTransaction {
                        transactionResult {
                            status
                            segments {
                                id
                                success
                            }
                        }
                        identifiers
                        zswapStartIndex
                        zswapEndIndex
                        fee
                    }
                }
                spentAtTransaction {
                    hash
                    __typename
                    ... on RegularTransaction {
                        transactionResult {
                            status
                            segments {
                                id
                                success
                            }
                        }
                        identifiers
                        zswapStartIndex
                        zswapEndIndex
                        fee
                    }
                }
            }
        }
        __typename
        ... on UnshieldedTransactionsProgress {
            highestTransactionId
        }
    }
}

subscription ZswapLedgerEventsSubscription($id: Int) {
    zswapLedgerEvents(id: $id) {
        id
    }
}

subscription DustLedgerEventsSubscription($id: Int) {
    dustLedgerEvents(id: $id) {
        id
        __typename
        ... on DustInitialUtxo {
            output {
                nonce
            }
        }
    }
}

subscription ShieldedNullifierTransactionsSubscription(
    $nullifierPrefixes: [HexEncoded!]!
    $fromBlock: Int
    $toBlock: Int
) {
    shieldedNullifierTransactions(
        nullifierPrefixes: $nullifierPrefixes
        fromBlock: $fromBlock
        toBlock: $toBlock
    ) {
        nullifier
        transactionId
        blockHeight
        blockHash
    }
}

query DustGenerationStatusQuery(
    $cardanoRewardAddresses: [CardanoRewardAddress!]!
) {
    dustGenerationStatus(cardanoRewardAddresses: $cardanoRewardAddresses) {
        cardanoRewardAddress
        dustAddress
        registered
        nightBalance
        generationRate
        currentCapacity
    }
}

query ZswapMerkleTreeCollapsedUpdateQuery(
    $start_index: Int!
    $end_index: Int!
) {
    zswapMerkleTreeCollapsedUpdate(
        startIndex: $start_index
        endIndex: $end_index
    ) {
        startIndex
        endIndex
        update
        protocolVersion
    }
}

query DustGenerationsQuery($cardanoRewardAddresses: [CardanoRewardAddress!]!) {
    dustGenerations(cardanoRewardAddresses: $cardanoRewardAddresses) {
        cardanoRewardAddress
        registrations {
            dustAddress
            valid
            nightBalance
            generationRate
            maxCapacity
            currentCapacity
            utxoTxHash
            utxoOutputIndex
        }
    }
}

query DustCommitmentMerkleTreeUpdateQuery($startIndex: Int!, $endIndex: Int!) {
    dustCommitmentMerkleTreeUpdate(startIndex: $startIndex, endIndex: $endIndex) {
        startIndex
        endIndex
        update
        protocolVersion
    }
}

query DustGenerationMerkleTreeUpdateQuery($startIndex: Int!, $endIndex: Int!) {
    dustGenerationMerkleTreeUpdate(startIndex: $startIndex, endIndex: $endIndex) {
        startIndex
        endIndex
        update
        protocolVersion
    }
}

query DParameterHistoryQuery {
    dParameterHistory {
        blockHeight
        blockHash
        timestamp
        numPermissionedCandidates
        numRegisteredCandidates
    }
}

query TermsAndConditionsHistoryQuery {
    termsAndConditionsHistory {
        blockHeight
        blockHash
        timestamp
        hash
        url
    }
}
