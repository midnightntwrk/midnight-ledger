[package]
name = "wallet-core"
version = "0.1.0"
edition = "2024"
license.workspace = true
publish = false

[features]
default = []
# Gates the live preprod connectivity tests so CI/offline runs don't depend
# on network reachability.
network-tests = []

[dependencies]
# Existing workspace members.
zswap = { path = "../../zswap", package = "midnight-zswap" }
zkir-v2 = { path = "../../zkir", package = "midnight-zkir" }
onchain-runtime = { path = "../../onchain-runtime", package = "midnight-onchain-runtime" }
serialize = { path = "../../serialize", package = "midnight-serialize" }
base-crypto = { path = "../../base-crypto", package = "midnight-base-crypto" }
coin-structure = { path = "../../coin-structure", package = "midnight-coin-structure" }
onchain-state = { path = "../../onchain-state", package = "midnight-onchain-state", features = ["public-internal-structure"] }
storage = { path = "../../storage", package = "midnight-storage" }
ledger = { path = "../../ledger", package = "midnight-ledger", default-features = false, features = ["proving"] }
transient-crypto = { path = "../../transient-crypto", package = "midnight-transient-crypto" }

# Address + HD derivation. Mirrors midnight-wallet/packages/{hd,
# address-format}: BIP32 secp256k1 (matches @scure/bip32 used
# upstream), bech32m for `mn_addr_*` HRP encoding.
bip32 = { version = "0.5", default-features = false, features = ["secp256k1"] }
bech32 = "0.11"
sha2 = "0.10"

# Async + IO.
async-stream = "0.3"
tokio = { version = "1.46.1", features = ["rt-multi-thread", "macros", "sync", "time", "process", "io-util"] }
reqwest = { version = "0.13", default-features = false, features = ["rustls", "json"] }
tokio-tungstenite = { version = "0.24", default-features = false, features = ["rustls-tls-webpki-roots", "connect"] }
futures = "0.3"

# Indexer GraphQL client. Schema + canonical queries are vendored from
# midnightntwrk/midnight-indexer (see queries/midnight-indexer/) — this
# is the same codegen toolchain the indexer maintainers use in
# `indexer-tests/`. graphql_client 0.16 matches their pin.
graphql_client = "0.16"

# Substrate-style JSON-RPC. Phase-1 of node RPC: raw method calls
# (`system_health`, `chain_getFinalizedHead`) without typed metadata.
# Phase-2 swaps to `subxt + midnight-node-metadata` for extrinsics.
jsonrpsee = { version = "0.24", default-features = false, features = ["ws-client"] }

# Substrate-typed RPC + extrinsic submission. Pinned to `subxt
# 0.44.0` to match `midnightntwrk/midnight-node`'s workspace
# version at `node-0.22.3` (the tag matching our local
# standalone). Bumping to subxt 0.50 means jumping to the
# `node-1.0.0-*` tag family.
subxt = "0.44"
subxt-signer = "0.44"
midnight-node-metadata = { git = "https://github.com/midnightntwrk/midnight-node.git", tag = "node-0.22.3" }
parity-scale-codec = { version = "3", features = ["derive"] }
scale-info = { version = "2", features = ["derive"] }

# Same secp256k1 secret scalar that backs the wallet's BIP340
# schnorr controller key (via base-crypto::signatures) is reused
# for ECDSA on the substrate tx envelope. k256 already lives in the
# tree via base-crypto; this entry just lights up the `ecdsa`
# feature for our consumers.
k256 = { version = "0.13", features = ["ecdsa"] }
blake2 = "0.10"

# rustls 0.23 panics at runtime if multiple crypto providers are
# linked but none is selected as default. dioxus-desktop and our HTTP
# stack each pull in different providers, so we install `ring`
# explicitly once at first network use (see src/crypto.rs).
rustls = { version = "0.23", default-features = false, features = ["ring"] }

# Errors / serde / utility.
thiserror = "2.0"
anyhow = "1.0"
# Async-trait sugar for the JsBridge trait — dyn-compatible
# trait with async methods.
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
hex = "0.4"
rand = { version = "0.8.4", features = ["getrandom"] }
rand_chacha = "0.3.1"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1.46.1", features = ["full"] }
tracing-subscriber = "0.3"
